name: Generate Static SVG (AArch64)

on:
  push:
    paths:
      - 'src/**'
      - '.github/workflows/generate-svg.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
          
      - name: Build SVG Generator (Native AArch64)
        run: make
        
      - name: Generate SVG (Native AArch64)
        run: make run
        
      - name: Commit and Push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add periodic-table.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update periodic-table.svg (AArch64 generated)" && git push)
